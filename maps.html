<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Map Quiz — India & MP | MPPSC 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1A237E;--saff:#FF6B00;--gold:#F9A825;
  --bg:#F4F6FB;--card:#fff;--border:#E2E8F0;
  --text:#1E293B;--muted:#64748B;
  --success:#15803D;--danger:#DC2626;--warn:#D97706;
  --radius:14px;--shadow:0 2px 12px rgba(30,41,59,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── TOP BAR ── */
.topbar{background:var(--navy);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.topbar-logo{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px}
.topbar-logo span{color:var(--gold)}
.topbar-tabs{display:flex;gap:6px}
.topbar-tab{padding:7px 18px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;color:rgba(255,255,255,.65);border:1px solid transparent;transition:all .15s;font-family:'DM Sans',sans-serif}
.topbar-tab.active{background:var(--saff);color:#fff}
.topbar-tab:hover:not(.active){background:rgba(255,255,255,.1);color:#fff}
.back-link{color:rgba(255,255,255,.6);font-size:12px;cursor:pointer;text-decoration:none;padding:6px 12px;border:1px solid rgba(255,255,255,.2);border-radius:8px}
.back-link:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── MAIN LAYOUT ── */
.main{max-width:1200px;margin:0 auto;padding:20px 20px 40px}

/* ── MODE TOGGLE ── */
.mode-bar{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.mode-label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.mode-pill{display:flex;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.mode-pill-btn{padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;transition:all .15s}
.mode-pill-btn.active{background:var(--navy);color:#fff}
.score-pill{margin-left:auto;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px 16px;font-size:12px;font-weight:600;display:flex;gap:14px}
.score-c{color:var(--success)}.score-w{color:var(--danger)}.score-p{color:var(--muted)}

/* ── MAP CONTAINER ── */
.map-wrap{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:0;overflow:hidden;position:relative}
.map-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.map-title{font-family:'Syne',sans-serif;font-size:15px;font-weight:700}
.map-hint{font-size:12px;color:var(--muted)}
.map-svg-wrap{width:100%;overflow:hidden;position:relative;background:#EEF3FF}
.map-svg-wrap svg{width:100%;height:auto;display:block}

/* ── SVG REGION STYLES ── */
.region{fill:#C8D8FF;stroke:#fff;stroke-width:1.5;cursor:pointer;transition:fill .18s,stroke .18s}
.region:hover{fill:#7DA8FF;stroke:#fff;stroke-width:2}
.region.correct{fill:#BBF7D0;stroke:#16A34A;stroke-width:2}
.region.wrong{fill:#FECACA;stroke:#DC2626;stroke-width:2}
.region.revealed{fill:#FEF9C3;stroke:#D97706;stroke-width:2}
.region.selected{fill:#7DA8FF;stroke:var(--navy);stroke-width:2.5}
.region-label{font-family:'Syne',sans-serif;font-size:8px;font-weight:700;fill:#1A237E;pointer-events:none;text-anchor:middle;dominant-baseline:middle;opacity:0}
.region-label.show{opacity:1}
.region-label.correct-lbl{fill:var(--success)}
.region-label.wrong-lbl{fill:var(--danger)}

/* District dots */
.dist-dot{fill:#1A237E;cursor:pointer;transition:r .15s,fill .15s}
.dist-dot:hover{fill:var(--saff)}
.dist-dot.correct{fill:var(--success)}
.dist-dot.wrong{fill:var(--danger)}
.dist-dot.revealed{fill:var(--warn)}

/* ── QUESTION PANEL ── */
.q-panel{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:20px;margin-top:16px}
.q-panel.hidden{display:none}
.q-banner{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.q-asking{font-size:14px;font-weight:600}
.q-target{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:var(--navy)}
.q-mode-tag{background:#EEF0FF;color:var(--navy);font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px}

/* Type mode */
.type-input-wrap{display:flex;gap:10px;margin-bottom:10px}
.type-input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:10px;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;background:var(--bg);transition:border .15s}
.type-input:focus{border-color:var(--navy)}
.type-input.correct{border-color:var(--success);background:#F0FDF4}
.type-input.wrong{border-color:var(--danger);background:#FEF2F2}
.btn-check{padding:12px 22px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s;white-space:nowrap}
.btn-check:hover{background:#2534a0}
.btn-reveal-ans{padding:10px 18px;background:none;border:1px solid var(--warn);color:var(--warn);border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-reveal-ans:hover{background:#FFFBEB}
.btn-next-q{padding:10px 22px;background:var(--saff);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}

/* MCQ mode */
.mcq-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.mcq-opt{padding:11px 16px;background:var(--bg);border:2px solid var(--border);border-radius:10px;font-size:14px;font-weight:500;cursor:pointer;text-align:left;font-family:'DM Sans',sans-serif;transition:all .15s;display:flex;align-items:center;gap:10px}
.mcq-opt:hover:not(:disabled){border-color:var(--navy);background:#F0F3FF}
.mcq-opt.correct{border-color:var(--success);background:#F0FDF4;color:var(--success);font-weight:700}
.mcq-opt.wrong{border-color:var(--danger);background:#FEF2F2;color:var(--danger)}
.mcq-opt:disabled{cursor:default}
.opt-lbl{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mcq-opt.correct .opt-lbl{background:var(--success)}
.mcq-opt.wrong .opt-lbl{background:var(--danger)}

/* Feedback */
.feedback{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:10px;display:none}
.feedback.show{display:block}
.feedback.correct{background:#F0FDF4;color:var(--success);border:1px solid #BBF7D0}
.feedback.wrong{background:#FEF2F2;color:var(--danger);border:1px solid #FECACA}
.feedback.reveal{background:#FFFBEB;color:var(--warn);border:1px solid #FEF08A}

/* ── PROGRESS BAR ── */
.prog-bar{height:6px;background:#E2E8F0;border-radius:3px;overflow:hidden;margin-bottom:16px}
.prog-fill{height:100%;background:var(--navy);border-radius:3px;transition:width .4s}

/* ── COMPLETED PANEL ── */
.complete-panel{text-align:center;padding:40px 20px}
.complete-emoji{font-size:48px;margin-bottom:12px}
.complete-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;margin-bottom:6px}
.complete-sub{font-size:14px;color:var(--muted);margin-bottom:20px}
.complete-score{display:inline-flex;gap:24px;background:var(--bg);border-radius:12px;padding:14px 28px;margin-bottom:20px}
.cs-item{text-align:center}
.cs-val{font-family:'Syne',sans-serif;font-size:24px;font-weight:800}
.cs-lbl{font-size:11px;color:var(--muted);margin-top:2px}
.btn-restart{padding:12px 28px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin:4px}
.btn-restart-saff{background:var(--saff)}

/* ── DRILL BREADCRUMB ── */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-bottom:14px;flex-wrap:wrap}
.bc-item{cursor:pointer;color:var(--navy);font-weight:600}
.bc-item:hover{text-decoration:underline}
.bc-sep{color:var(--border)}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;z-index:9999;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 20px rgba(0,0,0,.25);opacity:0;color:#fff;background:var(--navy)}

/* ── LEGEND ── */
.legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:12px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.leg-dot{width:14px;height:14px;border-radius:3px;flex-shrink:0}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .mcq-opts{grid-template-columns:1fr}
  .type-input-wrap{flex-direction:column}
  .topbar{padding:12px 14px}
  .main{padding:12px 12px 30px}
  .score-pill{display:none}
}
</style>
</head>

<div class="topbar">
  <div class="topbar-logo">🗺️ Map Quiz <span>— MPPSC 2026</span></div>
  <div class="topbar-tabs">

    <div class="topbar-tab" onclick="switchMap('mp')">🏛️ MP</div>
    <div class="topbar-tab" onclick="switchMap('dist')">📍 Districts</div>
  </div>
  <a class="back-link" href="index.html">← Back to Portal</a>
</div>

<div class="main">

  <!-- Breadcrumb (for district drill) -->
  <div class="breadcrumb" id="breadcrumb" style="display:none">
    <span class="bc-item" onclick="switchMap('mp')">MP Divisions</span>
    <span class="bc-sep">›</span>
    <span id="bc-div">Division</span>
  </div>

  <!-- Mode bar -->
  <div class="mode-bar">
    <span class="mode-label">Mode</span>
    <div class="mode-pill">
      <button class="mode-pill-btn active" onclick="setMode('mcq',this)">🎯 MCQ</button>

      <button class="mode-pill-btn" onclick="setMode('reveal',this)">👁️ Learn</button>
    </div>
    <div class="score-pill">

    <button onclick="resetQuiz()" style="padding:8px 16px;background:none;border:1px solid var(--border);border-radius:9px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted)">↺ Reset</button>
  </div>

  <!-- Progress bar -->
  <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>

  <!-- MAP SECTION -->
  <div class="map-wrap">
    <div class="map-header">

    </div>
    <div class="map-svg-wrap" id="map-svg-wrap">
      <!-- SVG injected by JS -->
    </div>
    <div style="padding:10px 16px 14px">
      <div class="legend" id="legend">

        <div class="leg-item"><div class="leg-dot" style="background:#BBF7D0;border:1px solid #16A34A"></div>Correct</div>
        <div class="leg-item"><div class="leg-dot" style="background:#FECACA;border:1px solid #DC2626"></div>Wrong</div>
        <div class="leg-item"><div class="leg-dot" style="background:#FEF9C3;border:1px solid #D97706"></div>Revealed</div>
      </div>
    </div>
  </div>

  <!-- QUESTION PANEL -->
  <div class="q-panel hidden" id="q-panel">
    <!-- Populated by JS -->
  </div>

</div>

<div id="toast"></div>

// ════════════════════════════════════════════
// APP STATE
// ════════════════════════════════════════════
let currentMap = 'india'; // 'india' | 'mp' | 'dist'
let currentMode = 'mcq';  // 'mcq' | 'type' | 'reveal'
let currentDivision = null;
let quizState = {}; // id -> 'correct'|'wrong'|'revealed'|null
let score = {correct:0, wrong:0, skip:0};
let activeRegion = null;
let quizQueue = [];
let quizIdx = 0;

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
function init() {
  renderMap('india');
}

function switchMap(mapId) {
  currentMap = mapId;
  currentDivision = null;
  quizState = {};
  score = {correct:0,wrong:0,skip:0};
  activeRegion = null;
  quizQueue = [];
  quizIdx = 0;
  updateScoreUI();

  document.querySelectorAll('.topbar-tab').forEach((t,i) => {
    t.classList.toggle('active', ['india','mp','dist'][i] === mapId);
  });
  document.getElementById('breadcrumb').style.display = 'none';
  document.getElementById('q-panel').classList.add('hidden');
  document.getElementById('prog-fill').style.width = '0%';
  renderMap(mapId);
}

// ════════════════════════════════════════════
// MAP RENDERING
// ════════════════════════════════════════════
function renderMap(mapId) {
  const wrap = document.getElementById('map-svg-wrap');
  const title = document.getElementById('map-title');
  const hint = document.getElementById('map-hint');

  if (mapId === 'india') {
    title.textContent = 'India — All States & UTs';
    hint.textContent = 'Click any state to quiz yourself';
    renderIndiaSVG(wrap);
  } else if (mapId === 'mp') {
    title.textContent = 'Madhya Pradesh — 10 Divisions';
    hint.textContent = 'Click a division to quiz it, or click its name to drill districts';
    renderMPSVG(wrap, null);
  } else if (mapId === 'dist' && currentDivision) {
    const div = MP_MAP_DATA.find(d => d.id === currentDivision);
    title.textContent = `${div ? div.name : ''} Division — Districts`;
    hint.textContent = 'Click any district to quiz yourself';
    renderDistrictSVG(wrap, currentDivision);
  }
}

function renderIndiaSVG(wrap) {
  let svg = `<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" style="background:#EEF3FF">
  <defs><filter id="dropshadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".12"/></filter></defs>`;

  INDIA_MAP_DATA.forEach(st => {
    const st_state = quizState[st.id];
    const cls = 'region' + (st_state ? ' '+st_state : '') + (activeRegion===st.id ? ' selected' : '');
    svg += `<polygon id="r-${st.id}" class="${cls}" points="${st.poly}"
      onclick="onRegionClick('${st.id}','${escQ(st.name)}')" filter="url(#dropshadow)"/>`;
  });

  // Labels (abbreviations always shown; full name after correct/revealed)
  INDIA_MAP_DATA.forEach(st => {
    const st_state = quizState[st.id];
    const showFull = st_state === 'correct' || st_state === 'revealed';
    const lblCls = 'region-label show' + (st_state === 'correct' ? ' correct-lbl' : st_state === 'wrong' ? ' wrong-lbl' : '');
    if (showFull) {
      svg += `<text class="${lblCls}" x="${st.lx}" y="${st.ly - 6}">${st.abbr}</text>`;
      svg += `<text class="${lblCls}" x="${st.lx}" y="${st.ly + 6}" style="font-size:6px;font-weight:500">${st.name}</text>`;
    } else {
      svg += `<text class="region-label show" x="${st.lx}" y="${st.ly}" style="opacity:0.35">${st.abbr}</text>`;
    }
  });

  svg += '</svg>';
  wrap.innerHTML = svg;
}

function renderMPSVG(wrap, highlightDiv) {
  let svg = `<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" style="background:#EEF3FF">
  <defs><filter id="dropshadow"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".12"/></filter></defs>`;

  MP_MAP_DATA.forEach(div => {
    const st_state = quizState[div.id];
    const cls = 'region' + (st_state ? ' '+st_state : '') + (activeRegion===div.id ? ' selected' : '');
    svg += `<polygon id="r-${div.id}" class="${cls}" points="${div.poly}"
      onclick="onRegionClick('${div.id}','${escQ(div.name)}')" filter="url(#dropshadow)"/>`;
  });

  MP_MAP_DATA.forEach(div => {
    const st_state = quizState[div.id];
    const showFull = st_state === 'correct' || st_state === 'revealed';
    const lblCls = 'region-label show' + (st_state === 'correct' ? ' correct-lbl' : '');
    svg += `<text class="${lblCls}" x="${div.lx}" y="${div.ly}" style="font-size:11px;${showFull?'':'opacity:.4'}">${div.name}</text>`;
    // Drill button
    svg += `<text x="${div.lx}" y="${div.ly+16}" style="font-size:9px;fill:#FF6B00;cursor:pointer;font-weight:700;text-anchor:middle"
      onclick="drillDivision('${div.id}')">▶ Districts</text>`;
  });

  svg += '</svg>';
  wrap.innerHTML = svg;
}

function renderDistrictSVG(wrap, divId) {
  const div = MP_MAP_DATA.find(d => d.id === divId);
  if (!div) return;

  // Find bounding box of districts
  const xs = div.districts.map(d => d.cx);
  const ys = div.districts.map(d => d.cy);
  const minX = Math.min(...xs) - 60, maxX = Math.max(...xs) + 60;
  const minY = Math.min(...ys) - 60, maxY = Math.max(...ys) + 60;
  const W = Math.max(400, maxX - minX + 120);
  const H = Math.max(300, maxY - minY + 120);
  const offX = minX - 60, offY = minY - 60;

  let svg = `<svg viewBox="${offX} ${offY} ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="background:#EEF3FF;min-height:300px">`;

  // Draw district dots
  div.districts.forEach(d => {
    const st_state = quizState[d.id];
    const dotCls = 'dist-dot' + (st_state ? ' '+st_state : '') + (activeRegion===d.id ? ' selected' : '');
    const r = activeRegion === d.id ? 14 : 10;
    svg += `<circle id="r-${d.id}" class="${dotCls}" cx="${d.cx}" cy="${d.cy}" r="${r}"
      onclick="onRegionClick('${d.id}','${escQ(d.name)}')"/>`;

    // Label
    const showName = st_state === 'correct' || st_state === 'revealed';
    const color = st_state === 'correct' ? '#15803D' : st_state === 'wrong' ? '#DC2626' : st_state === 'revealed' ? '#D97706' : '#1A237E';
    if (showName) {
      svg += `<text x="${d.cx}" y="${d.cy - 18}" text-anchor="middle" style="font-family:Syne,sans-serif;font-size:10px;font-weight:700;fill:${color}">${d.name}</text>`;
    } else if (activeRegion === d.id) {
      svg += `<text x="${d.cx}" y="${d.cy - 18}" text-anchor="middle" style="font-family:Syne,sans-serif;font-size:10px;font-weight:700;fill:${color}">?</text>`;
    }
  });

  svg += '</svg>';
  wrap.innerHTML = svg;
}

function drillDivision(divId) {
  currentDivision = divId;
  currentMap = 'dist';
  quizState = {};
  score = {correct:0,wrong:0,skip:0};
  activeRegion = null;
  updateScoreUI();

  const div = MP_MAP_DATA.find(d => d.id === divId);
  document.getElementById('breadcrumb').style.display = 'flex';
  document.getElementById('bc-div').textContent = div ? div.name + ' Division' : '';
  document.getElementById('map-title').textContent = `${div ? div.name : ''} — Districts`;
  document.getElementById('map-hint').textContent = 'Click any district dot to quiz yourself';
  document.getElementById('q-panel').classList.add('hidden');
  document.getElementById('prog-fill').style.width = '0%';

  // Update tab highlights
  document.querySelectorAll('.topbar-tab').forEach((t,i) => {
    t.classList.toggle('active', i === 2);
  });

  renderDistrictSVG(document.getElementById('map-svg-wrap'), divId);
}

// ════════════════════════════════════════════
// REGION CLICK
// ════════════════════════════════════════════
function onRegionClick(id, name) {
  // If already done, just highlight
  if (quizState[id] === 'correct') { showToast('✓ Already correct!','#15803D'); return; }

  activeRegion = id;
  rerenderMap();
  showQuestion(id, name);
}

function rerenderMap() {
  const wrap = document.getElementById('map-svg-wrap');
  if (currentMap === 'india') renderIndiaSVG(wrap);
  else if (currentMap === 'mp') renderMPSVG(wrap, currentDivision);
  else if (currentMap === 'dist') renderDistrictSVG(wrap, currentDivision);
}

// ════════════════════════════════════════════
// QUESTION PANEL
// ════════════════════════════════════════════
function showQuestion(id, name) {
  const panel = document.getElementById('q-panel');
  panel.classList.remove('hidden');

  const mapLabel = currentMap === 'india' ? 'State' : currentMap === 'mp' ? 'Division' : 'District';

  if (currentMode === 'reveal') {
    panel.innerHTML = `
      <div class="q-banner">
        <div class="q-asking">You clicked: &nbsp;</div>
        <div class="q-target">${name}</div>
        <div class="q-mode-tag">Learn Mode</div>
      </div>
      <div class="feedback reveal show">👁️ This is <b>${name}</b>. Study its location!</div>
      <button class="btn-next-q" onclick="markRevealed('${id}')">Mark as Studied →</button>`;
    return;
  }

  if (currentMode === 'mcq') showMCQ(id, name, mapLabel);
  else showTypeQ(id, name, mapLabel);
}

function showMCQ(id, name, mapLabel) {
  const panel = document.getElementById('q-panel');
  // Generate wrong options
  const allNames = getData().map(r => r.name).filter(n => n !== name);
  shuffle(allNames);
  const wrong = allNames.slice(0, 3);
  const opts = shuffle([name, ...wrong]);
  const LABS = ['A','B','C','D'];

  let optsHTML = opts.map((opt,i) =>
    `<button class="mcq-opt" onclick="checkMCQ(this,'${escQ(opt)}','${escQ(name)}','${id}')">
      <span class="opt-lbl">${LABS[i]}</span>${opt}
    </button>`).join('');

  panel.innerHTML = `
    <div class="q-banner">
      <div class="q-asking">Which <b>${mapLabel}</b> did you click?</div>
      <div class="q-mode-tag">MCQ Mode</div>
    </div>
    <div class="mcq-opts">${optsHTML}</div>
    <div class="feedback" id="q-feedback"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-reveal-ans" onclick="revealAnswer('${id}','${escQ(name)}')">Show Answer</button>
    </div>`;
}

function showTypeQ(id, name, mapLabel) {
  const panel = document.getElementById('q-panel');
  panel.innerHTML = `
    <div class="q-banner">
      <div class="q-asking">Name this <b>${mapLabel}</b>:</div>
      <div class="q-mode-tag">Type Mode</div>
    </div>
    <div class="type-input-wrap">
      <input class="type-input" id="type-inp" placeholder="Type the name..." autocomplete="off" autocorrect="off"
        onkeydown="if(event.key==='Enter')checkType('${id}','${escQ(name)}')">
      <button class="btn-check" onclick="checkType('${id}','${escQ(name)}')">Check →</button>
    </div>
    <div class="feedback" id="q-feedback"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-reveal-ans" onclick="revealAnswer('${id}','${escQ(name)}')">Show Answer</button>
    </div>`;
  setTimeout(() => { const inp = document.getElementById('type-inp'); if(inp) inp.focus(); }, 100);
}

// ════════════════════════════════════════════
// ANSWER CHECKING
// ════════════════════════════════════════════
function checkMCQ(btn, chosen, correct, id) {
  document.querySelectorAll('.mcq-opt').forEach(b => b.disabled = true);
  const fb = document.getElementById('q-feedback');
  if (chosen === correct) {
    btn.classList.add('correct');
    setResult(id, 'correct');
    fb.className = 'feedback correct show';
    fb.innerHTML = `✓ Correct! <b>${correct}</b>`;
    score.correct++;
  } else {
    btn.classList.add('wrong');
    // Mark correct one green
    document.querySelectorAll('.mcq-opt').forEach(b => { if(b.textContent.trim().slice(1).trim() === correct) b.classList.add('correct'); });
    setResult(id, 'wrong');
    fb.className = 'feedback wrong show';
    fb.innerHTML = `✗ Wrong. The answer is <b>${correct}</b>`;
    score.wrong++;
  }
  updateScoreUI();
  addNextBtn(id);
}

function checkType(id, correct) {
  const inp = document.getElementById('type-inp');
  if (!inp) return;
  const val = inp.value.trim();
  if (!val) { showToast('Type something first!','#D97706'); return; }
  const fb = document.getElementById('q-feedback');
  const isCorrect = normalize(val) === normalize(correct);
  inp.disabled = true;
  document.querySelector('.btn-check') && (document.querySelector('.btn-check').disabled = true);
  if (isCorrect) {
    inp.classList.add('correct');
    setResult(id, 'correct');
    fb.className = 'feedback correct show';
    fb.innerHTML = `✓ Correct! <b>${correct}</b>`;
    score.correct++;
  } else {
    inp.classList.add('wrong');
    setResult(id, 'wrong');
    fb.className = 'feedback wrong show';
    fb.innerHTML = `✗ Wrong. You said "<b>${val}</b>". Answer: <b>${correct}</b>`;
    score.wrong++;
  }
  updateScoreUI();
  addNextBtn(id);
}

function revealAnswer(id, name) {
  setResult(id, 'revealed');
  const panel = document.getElementById('q-panel');
  const fb = document.getElementById('q-feedback');
  if (fb) {
    fb.className = 'feedback reveal show';
    fb.innerHTML = `👁️ Answer: <b>${name}</b>`;
  }
  document.querySelectorAll('.mcq-opt,.btn-check,.type-input').forEach(el => el.disabled = true);
  score.skip++;
  updateScoreUI();
  addNextBtn(id);
}

function markRevealed(id) {
  setResult(id, 'revealed');
  score.skip++;
  updateScoreUI();
  document.getElementById('q-panel').classList.add('hidden');
  activeRegion = null;
  rerenderMap();
  checkComplete();
}

function addNextBtn(id) {
  // Remove existing
  const existing = document.getElementById('btn-next-q');
  if (existing) existing.remove();
  const btn = document.createElement('button');
  btn.className = 'btn-next-q';
  btn.id = 'btn-next-q';
  btn.textContent = 'Next Region →';
  btn.onclick = () => {
    activeRegion = null;
    document.getElementById('q-panel').classList.add('hidden');
    rerenderMap();
    checkComplete();
  };
  document.getElementById('q-panel').appendChild(btn);
}

// ════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════
function setResult(id, state) {
  quizState[id] = state;
  rerenderMap();
  updateProgress();
}

function getData() {
  if (currentMap === 'india') return INDIA_MAP_DATA;
  if (currentMap === 'mp') return MP_MAP_DATA;
  if (currentMap === 'dist' && currentDivision) {
    return MP_MAP_DATA.find(d => d.id === currentDivision)?.districts || [];
  }
  return [];
}

function updateProgress() {
  const data = getData();
  const done = data.filter(r => quizState[r.id]).length;
  const pct = data.length ? done / data.length * 100 : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
}

function checkComplete() {
  const data = getData();
  const done = data.filter(r => quizState[r.id]).length;
  if (done >= data.length && data.length > 0) {
    showComplete();
  }
}

function showComplete() {
  const panel = document.getElementById('q-panel');
  panel.classList.remove('hidden');
  const total = getData().length;
  const pct = Math.round(score.correct / total * 100);
  const emoji = pct >= 80 ? '🏆' : pct >= 60 ? '🎉' : pct >= 40 ? '💪' : '📚';
  panel.innerHTML = `
    <div class="complete-panel">
      <div class="complete-emoji">${emoji}</div>
      <div class="complete-title">Quiz Complete!</div>
      <div class="complete-sub">You've gone through all ${total} regions</div>
      <div class="complete-score">
        <div class="cs-item"><div class="cs-val" style="color:var(--success)">${score.correct}</div><div class="cs-lbl">Correct</div></div>
        <div class="cs-item"><div class="cs-val" style="color:var(--danger)">${score.wrong}</div><div class="cs-lbl">Wrong</div></div>
        <div class="cs-item"><div class="cs-val" style="color:var(--warn)">${score.skip}</div><div class="cs-lbl">Revealed</div></div>
        <div class="cs-item"><div class="cs-val">${pct}%</div><div class="cs-lbl">Score</div></div>
      </div>
      <button class="btn-restart" onclick="resetQuiz()">↺ Try Again</button>
      <button class="btn-restart btn-restart-saff" onclick="setModeAndReset('mcq')">Practice MCQ</button>
      <button class="btn-restart btn-restart-saff" onclick="setModeAndReset('type')">Practice Typing</button>
    </div>`;
}

function normalize(s) {
  return s.toLowerCase().replace(/[^a-z0-9]/g,'');
}
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}
function escQ(s) { return s.replace(/'/g,"\\'"); }

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-pill-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('q-panel').classList.add('hidden');
  activeRegion = null;
  rerenderMap();
}
function setModeAndReset(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-pill-btn').forEach((b,i) => b.classList.toggle('active', ['mcq','type','reveal'][i]===mode));
  resetQuiz();
}

function resetQuiz() {
  quizState = {};
  score = {correct:0,wrong:0,skip:0};
  activeRegion = null;
  updateScoreUI();
  updateProgress();
  document.getElementById('q-panel').classList.add('hidden');
  rerenderMap();
}

function updateScoreUI() {
  document.getElementById('sc-correct').textContent = score.correct;
  document.getElementById('sc-wrong').textContent = score.wrong;
  document.getElementById('sc-skip').textContent = score.skip;
}

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.style.background = color || '#1A237E';
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(() => t.style.opacity='0', 2400);
}

// ════════════════════════════════════════════
// START
// ════════════════════════════════════════════
init();
</script>
</body>
</html>
