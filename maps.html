<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Map Quiz — India &amp; MP | MPPSC 2026</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
:root{--bg:#0f1117;--surf:#1a1d27;--s2:#232635;--bord:#2e3248;
  --acc:#6c63ff;--a2:#4fc3f7;--ok:#22c55e;--err:#ef4444;--rev:#f59e0b;
  --txt:#e2e8f0;--mute:#94a3b8}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--txt);
     height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* TOPBAR */
#top{background:var(--surf);border-bottom:1px solid var(--bord);padding:8px 14px;
     display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;min-height:52px}
#top a{color:var(--mute);text-decoration:none;font-size:12px}
#top a:hover{color:var(--a2)}
.tabs,.modes{display:flex;background:var(--s2);border-radius:8px;padding:3px;gap:2px}
.tab,.mode{padding:5px 11px;border-radius:6px;border:none;background:transparent;
  color:var(--mute);cursor:pointer;font-size:12px;font-weight:600;transition:.15s;white-space:nowrap}
.tab.on{background:var(--acc);color:#fff}
.mode.on{background:var(--surf);color:var(--txt);border:1px solid var(--bord)}
.tab:hover:not(.on),.mode:hover:not(.on){color:var(--txt);background:var(--bord)}
#sc{margin-left:auto;display:flex;gap:9px;font-size:13px;font-weight:700}
.sco{color:var(--ok)}.scw{color:var(--err)}.scr{color:var(--mute)}
.ibtn{padding:5px 10px;border-radius:6px;border:1px solid var(--bord);
  background:transparent;color:var(--mute);cursor:pointer;font-size:12px;transition:.15s}
.ibtn:hover{color:var(--txt);border-color:var(--acc)}

/* PROGRESS */
#pb-w{height:3px;background:var(--bord);flex-shrink:0}
#pb{height:100%;background:linear-gradient(90deg,var(--acc),var(--a2));width:0%;transition:width .4s}

/* BREADCRUMB */
#bc{background:var(--s2);border-bottom:1px solid var(--bord);padding:6px 14px;
  font-size:12px;color:var(--mute);flex-shrink:0;display:flex;gap:5px;align-items:center}
.lnk{cursor:pointer}.lnk:hover{color:var(--a2)}.sep{color:var(--bord)}

/* MAP WRAP */
#mw{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}
.leaflet-container{background:#0a0e1a}

/* leaflet */
.leaflet-control-zoom{border:1px solid var(--bord)!important;border-radius:8px!important;overflow:hidden}
.leaflet-control-zoom a{background:var(--surf)!important;color:var(--txt)!important;border-color:var(--bord)!important}
.leaflet-control-zoom a:hover{background:var(--s2)!important}
.leaflet-tooltip{background:var(--surf)!important;border:1px solid var(--bord)!important;
  color:var(--txt)!important;font-size:11px!important;border-radius:6px!important;
  box-shadow:none!important;padding:2px 7px!important}
.leaflet-tooltip::before{display:none!important}

/* MAP TITLE */
#mt{position:absolute;top:10px;left:10px;z-index:999;background:var(--surf);
  border:1px solid var(--bord);padding:7px 13px;border-radius:10px;
  font-size:12px;font-weight:700;color:var(--txt);pointer-events:none}

/* LEGEND */
#leg{position:absolute;bottom:14px;left:10px;background:var(--surf);
  border:1px solid var(--bord);border-radius:10px;padding:9px 13px;
  z-index:1000;font-size:11px;display:flex;flex-direction:column;gap:5px}
.lr{display:flex;align-items:center;gap:7px;color:var(--mute)}
.ld{width:11px;height:11px;border-radius:2px;flex-shrink:0}

/* QUIZ PANEL */
#qp{position:absolute;right:10px;top:10px;width:285px;background:var(--surf);
  border:1px solid var(--bord);border-radius:12px;padding:14px;z-index:1000;
  display:none;box-shadow:0 8px 32px rgba(0,0,0,.6)}
#qp.vis{display:block}
#qcl{position:absolute;top:8px;right:8px;background:none;border:none;
  color:var(--mute);cursor:pointer;font-size:15px;padding:2px 6px;border-radius:4px}
#qcl:hover{color:var(--err);background:rgba(239,68,68,.1)}
#qreg{font-size:10px;color:var(--mute);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
#qlbl{font-size:14px;font-weight:700;margin-bottom:11px;line-height:1.4}
#opts{display:flex;flex-direction:column;gap:7px}
.opt{padding:9px 13px;background:var(--s2);border:1px solid var(--bord);
  border-radius:8px;color:var(--txt);cursor:pointer;font-size:12px;text-align:left;transition:.14s}
.opt:hover:not(:disabled){background:var(--bord);border-color:var(--acc)}
.opt.ok{background:rgba(34,197,94,.18)!important;border-color:var(--ok)!important;color:var(--ok)}
.opt.bad{background:rgba(239,68,68,.14)!important;border-color:var(--err)!important;color:var(--err)}
.opt:disabled{cursor:default}
#tw{display:flex;flex-direction:column;gap:7px}
#ti{padding:9px 11px;background:var(--s2);border:1px solid var(--bord);
  border-radius:8px;color:var(--txt);font-size:13px;outline:none;transition:.15s;width:100%}
#ti:focus{border-color:var(--acc)}
#ti.ok{border-color:var(--ok);background:rgba(34,197,94,.08)}
#ti.bad{border-color:var(--err);background:rgba(239,68,68,.08)}
#tsb{padding:8px;background:var(--acc);border:none;border-radius:8px;
  color:#fff;cursor:pointer;font-size:12px;font-weight:700;transition:opacity .15s}
#tsb:hover{opacity:.82}
#qfb{margin-top:8px;padding:7px 11px;border-radius:7px;font-size:12px;font-weight:600;display:none}
#qfb.ok{background:rgba(34,197,94,.17);color:var(--ok);display:block}
#qfb.bad{background:rgba(239,68,68,.13);color:var(--err);display:block}
#qfb.rv{background:rgba(245,158,11,.14);color:var(--rev);display:block}
#qnx{margin-top:8px;width:100%;padding:8px;background:var(--s2);
  border:1px solid var(--bord);border-radius:8px;color:var(--txt);
  cursor:pointer;font-size:12px;display:none;transition:.15s}
#qnx:hover{background:var(--bord)}
#qnx.vis{display:block}
.drbtn{margin-top:8px;width:100%;padding:8px;background:transparent;
  border:1px solid var(--acc);border-radius:8px;color:var(--a2);
  cursor:pointer;font-size:12px;font-weight:600;transition:.15s}
.drbtn:hover{background:var(--acc);color:#fff}

/* LOADING */
#ld{position:absolute;inset:0;background:var(--bg);z-index:3000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spin{width:36px;height:36px;border:3px solid var(--bord);border-top-color:var(--acc);
  border-radius:50%;animation:rot .75s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#ld p{color:var(--mute);font-size:13px}

/* COMPLETION */
#done{display:none;position:absolute;inset:0;background:rgba(10,14,26,.95);
  z-index:2000;flex-direction:column;align-items:center;justify-content:center}
#done.vis{display:flex}
.dbox{background:var(--surf);border:1px solid var(--bord);border-radius:16px;
  padding:34px;text-align:center;max-width:330px;width:92%}
.dbox h2{font-size:22px;margin-bottom:5px}
.dpct{font-size:50px;font-weight:800;
  background:linear-gradient(135deg,var(--acc),var(--a2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;line-height:1.1;margin-bottom:8px}
.dst{display:flex;justify-content:center;gap:20px;margin:10px 0;font-size:13px}
.ds{display:flex;flex-direction:column;align-items:center;gap:2px}
.ds strong{font-size:19px}.ds span{color:var(--mute);font-size:11px}
.dbtns{display:flex;gap:8px;margin-top:16px}
.dbtn{flex:1;padding:9px;border-radius:8px;border:1px solid var(--bord);
  background:var(--s2);color:var(--txt);cursor:pointer;font-size:12px;font-weight:700}
.dbtn:hover{opacity:.83}.dbtn.pri{background:var(--acc);border-color:var(--acc)}
</style>
</head>
<body>

<div id="top">
  <a href="index.html">← Portal</a>
  <div class="tabs">
    <button class="tab on" data-v="india" onclick="switchV('india')">🇮🇳 India</button>
    <button class="tab"    data-v="divs"  onclick="switchV('divs')">🏛️ MP Divs</button>
    <button class="tab"    data-v="dists" onclick="switchV('dists')">📍 MP Dists</button>
  </div>
  <div class="modes">
    <button class="mode on" data-m="mcq"   onclick="setM('mcq')">🎯 MCQ</button>
    <button class="mode"    data-m="type"  onclick="setM('type')">✍️ Type</button>
    <button class="mode"    data-m="learn" onclick="setM('learn')">👁️ Learn</button>
  </div>
  <div id="sc">
    <span class="sco">✓ <b id="s1">0</b></span>
    <span class="scw">✗ <b id="s2">0</b></span>
    <span class="scr">— <b id="s3">0</b></span>
  </div>
  <button class="ibtn" onclick="resetAll()">↺ Reset</button>
  <button class="ibtn" onclick="toggleFS()">⛶ Full</button>
</div>

<div id="pb-w"><div id="pb"></div></div>

<div id="bc">
  <span class="lnk" onclick="switchV('india')">🇮🇳 India</span>
  <span class="sep">›</span>
  <span id="bc2">All States &amp; UTs</span>
  <span class="sep" id="bs3" style="display:none">›</span>
  <span id="bc3" style="display:none"></span>
</div>

<div id="mw">
  <div id="ld"><div class="spin"></div><p id="lmsg">Loading map…</p></div>
  <div id="map"></div>
  <div id="mt">India — All States &amp; UTs</div>

  <div id="leg">
    <div class="lr"><div class="ld" style="background:#1e3a5f;border:1px solid #4a90d9"></div>Not attempted</div>
    <div class="lr"><div class="ld" style="background:rgba(34,197,94,.3);border:1px solid #22c55e"></div>Correct</div>
    <div class="lr"><div class="ld" style="background:rgba(239,68,68,.25);border:1px solid #ef4444"></div>Wrong</div>
    <div class="lr"><div class="ld" style="background:rgba(245,158,11,.25);border:1px solid #f59e0b"></div>Revealed</div>
  </div>

  <div id="qp">
    <button id="qcl" onclick="closeQ()">✕</button>
    <div id="qreg">REGION</div>
    <div id="qlbl">Click a region to quiz</div>
    <div id="opts"></div>
    <div id="tw" style="display:none">
      <input id="ti" type="text" placeholder="Type name…" onkeydown="if(event.key==='Enter')chkType()"/>
      <button id="tsb" onclick="chkType()">Check ✓</button>
    </div>
    <div id="qfb"></div>
    <button id="qnx" onclick="closeQ()">Next →</button>
  </div>

  <div id="done">
    <div class="dbox">
      <h2>🎉 Done!</h2>
      <div class="dpct" id="dpct">0%</div>
      <div class="dst">
        <div class="ds"><strong id="dok" style="color:var(--ok)">0</strong><span>Correct</span></div>
        <div class="ds"><strong id="dbd" style="color:var(--err)">0</strong><span>Wrong</span></div>
        <div class="ds"><strong id="drv" style="color:var(--rev)">0</strong><span>Skipped</span></div>
      </div>
      <div class="dbtns">
        <button class="dbtn" onclick="closeDone()">Review</button>
        <button class="dbtn pri" onclick="resetAll()">↺ Try Again</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────
const STATES=[
  {name:"Andhra Pradesh",abbr:"AP"},{name:"Arunachal Pradesh",abbr:"AR"},
  {name:"Assam",abbr:"AS"},{name:"Bihar",abbr:"BR"},
  {name:"Chhattisgarh",abbr:"CG"},{name:"Goa",abbr:"GA"},
  {name:"Gujarat",abbr:"GJ"},{name:"Haryana",abbr:"HR"},
  {name:"Himachal Pradesh",abbr:"HP"},{name:"Jharkhand",abbr:"JH"},
  {name:"Karnataka",abbr:"KA"},{name:"Kerala",abbr:"KL"},
  {name:"Madhya Pradesh",abbr:"MP"},{name:"Maharashtra",abbr:"MH"},
  {name:"Manipur",abbr:"MN"},{name:"Meghalaya",abbr:"ML"},
  {name:"Mizoram",abbr:"MZ"},{name:"Nagaland",abbr:"NL"},
  {name:"Odisha",abbr:"OD"},{name:"Punjab",abbr:"PB"},
  {name:"Rajasthan",abbr:"RJ"},{name:"Sikkim",abbr:"SK"},
  {name:"Tamil Nadu",abbr:"TN"},{name:"Telangana",abbr:"TS"},
  {name:"Tripura",abbr:"TR"},{name:"Uttar Pradesh",abbr:"UP"},
  {name:"Uttarakhand",abbr:"UK"},{name:"West Bengal",abbr:"WB"},
  {name:"Andaman & Nicobar",abbr:"AN"},{name:"Chandigarh",abbr:"CH"},
  {name:"Dadra & Nagar Haveli and Daman & Diu",abbr:"DD"},
  {name:"Delhi",abbr:"DL"},{name:"Jammu & Kashmir",abbr:"JK"},
  {name:"Ladakh",abbr:"LA"},{name:"Lakshadweep",abbr:"LD"},
  {name:"Puducherry",abbr:"PY"}
];

const DIVS=[
  {name:"Bhopal",  abbr:"BPL",color:"#6c63ff",dists:["Bhopal","Raisen","Rajgarh","Sehore","Vidisha"]},
  {name:"Indore",  abbr:"IDR",color:"#ec4899",dists:["Indore","Dhar","Jhabua","Alirajpur","Burhanpur","Khargone","Barwani","Khandwa"]},
  {name:"Gwalior", abbr:"GWL",color:"#f59e0b",dists:["Gwalior","Ashoknagar","Datia","Guna","Shivpuri"]},
  {name:"Chambal", abbr:"CBL",color:"#10b981",dists:["Morena","Bhind","Sheopur"]},
  {name:"Jabalpur",abbr:"JBP",color:"#3b82f6",dists:["Jabalpur","Katni","Mandla","Seoni","Balaghat","Chhindwara","Narsinghpur"]},
  {name:"Rewa",    abbr:"RWA",color:"#ef4444",dists:["Rewa","Satna","Sidhi","Singrauli"]},
  {name:"Sagar",   abbr:"SGR",color:"#8b5cf6",dists:["Sagar","Chhatarpur","Damoh","Panna","Tikamgarh","Niwari"]},
  {name:"Ujjain",  abbr:"UJN",color:"#06b6d4",dists:["Ujjain","Mandsour","Neemuch","Ratlam","Shajapur","Agar Malwa","Dewas"]},
  {name:"Narmadapuram",abbr:"NPM",color:"#84cc16",dists:["Narmadapuram","Betul","Harda"]},
  {name:"Shahdol", abbr:"SDL",color:"#f97316",dists:["Shahdol","Anuppur","Umaria","Dindori"]}
];

const ALLD=[
  "Agar Malwa","Alirajpur","Anuppur","Ashoknagar","Balaghat","Barwani","Betul","Bhind",
  "Bhopal","Burhanpur","Chhatarpur","Chhindwara","Damoh","Datia","Dewas","Dhar",
  "Dindori","Guna","Gwalior","Harda","Narmadapuram","Indore","Jabalpur","Jhabua",
  "Katni","Khandwa","Khargone","Mandla","Mandsour","Morena","Narsinghpur","Neemuch",
  "Niwari","Panna","Raisen","Rajgarh","Ratlam","Rewa","Sagar","Satna","Sehore",
  "Seoni","Shahdol","Shajapur","Sheopur","Shivpuri","Sidhi","Singrauli","Tikamgarh",
  "Ujjain","Umaria","Vidisha"
];

// ── APP STATE ─────────────────────────────────────
let V='india', M='mcq';
let SC={ok:0,bad:0,rv:0};
let RS={};          // regionKey→'ok'|'bad'|'rv'
let CUR=null;       // current quiz region
let TOT=0;
let GC={};          // GeoJSON cache
let LYRS=[];        // active leaflet layers
let CURDIV=null;    // current division filter

// ── URLS (multiple fallbacks) ─────────────────────
const INDIA_URLS=[
  'https://cdn.jsdelivr.net/gh/udit-001/india-maps-data@main/geojson/india.geojson',
  'https://raw.githubusercontent.com/udit-001/india-maps-data/main/geojson/india.geojson',
  'https://cdn.jsdelivr.net/gh/Subhash9325/GeoJson-Data-of-Indian-States@master/Indian_States.geojson'
];
const MP_URLS=[
  'https://cdn.jsdelivr.net/gh/datta07/INDIAN-SHAPEFILES@master/INDIA/MADHYA%20PRADESH/MADHYA_PRADESH_DISTRICTS.geojson',
  'https://raw.githubusercontent.com/datta07/INDIAN-SHAPEFILES/master/INDIA/MADHYA%20PRADESH/MADHYA_PRADESH_DISTRICTS.geojson',
  'https://cdn.jsdelivr.net/gh/udit-001/india-maps-data@main/geojson/states/madhya-pradesh.geojson',
  'https://raw.githubusercontent.com/udit-001/india-maps-data/main/geojson/states/madhya-pradesh.geojson'
];

// ── MAP ───────────────────────────────────────────
const MAP=L.map('map',{zoomControl:true,attributionControl:false,zoomSnap:.5,minZoom:3,maxZoom:11});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
  {subdomains:'abcd',maxZoom:19}).addTo(MAP);
MAP.setView([22.5,80],5);

// ── GEO FETCH ─────────────────────────────────────
async function fetchG(key){
  if(GC[key]) return GC[key];
  const urls=key==='india'?INDIA_URLS:MP_URLS;
  for(const url of urls){
    try{
      const r=await fetch(url);
      if(!r.ok) continue;
      const d=await r.json();
      if(d&&d.features&&d.features.length>0){GC[key]=d;return d;}
    }catch(e){/* next */}
  }
  return null;
}

// ── PROP HELPERS ─────────────────────────────────
function sName(f){
  const p=f.properties||{};
  return p.ST_NM||p.state||p.NAME_1||p.statename||p.State_Name||p.State||p.name||p.NAME||'';
}
function dName(f){
  const p=f.properties||{};
  return p.DISTRICT||p.district||p.NAME_2||p.dtname||p.District||p.name||p.NAME||'';
}
function canonState(raw){
  if(!raw) return null;
  const r=raw.toLowerCase().trim();
  return STATES.find(s=>{
    const n=s.name.toLowerCase();
    return n===r||r===n||r.startsWith(n.split(' ')[0])||n.startsWith(r.split(' ')[0])||
           r.includes(n)||n.includes(r);
  })||null;
}
function canonDist(raw){
  if(!raw) return raw;
  const r=raw.toLowerCase().trim();
  return ALLD.find(d=>d.toLowerCase()===r||r.includes(d.toLowerCase())||d.toLowerCase().includes(r))||raw;
}
function fuzzyMatchDist(raw, allowed){
  const r=raw.toLowerCase();
  return [...allowed].some(a=>{
    const al=a.toLowerCase();
    return al===r||r.includes(al)||al.includes(r)||levenFuzzy(al,r)<=2;
  });
}
function levenFuzzy(a,b){
  if(Math.abs(a.length-b.length)>4) return 99;
  let d=[];
  for(let i=0;i<=b.length;i++) d[i]=[i];
  for(let j=0;j<=a.length;j++) d[0][j]=j;
  for(let i=1;i<=b.length;i++)
    for(let j=1;j<=a.length;j++)
      d[i][j]=b[i-1]===a[j-1]?d[i-1][j-1]:1+Math.min(d[i-1][j-1],d[i][j-1],d[i-1][j]);
  return d[b.length][a.length];
}

// ── STYLE ─────────────────────────────────────────
function rStyle(key,df,ds){
  const s=RS[key];
  if(s==='ok')  return{fillColor:'rgba(34,197,94,.35)',color:'#22c55e',weight:1.5,fillOpacity:1,opacity:1};
  if(s==='bad') return{fillColor:'rgba(239,68,68,.28)',color:'#ef4444',weight:1.5,fillOpacity:1,opacity:1};
  if(s==='rv')  return{fillColor:'rgba(245,158,11,.28)',color:'#f59e0b',weight:1.5,fillOpacity:1,opacity:1};
  return{fillColor:df||'rgba(30,58,95,.65)',color:ds||'#4a90d9',weight:1,fillOpacity:1,opacity:1};
}

// ── CLEAR MAP ─────────────────────────────────────
function clearMap(){
  MAP.eachLayer(l=>{if(!(l instanceof L.TileLayer)) MAP.removeLayer(l);});
  LYRS=[];
}

// ── INDIA ─────────────────────────────────────────
async function drawIndia(){
  clearMap(); closeQ();
  setTitle('India — All States & UTs');
  setBC('All States & UTs');
  showLD(true,'Loading India GeoJSON…');
  const data=await fetchG('india');
  showLD(false);
  if(!data){showErr('Could not load India map. Check connection.');return;}

  const lyr=L.geoJSON(data,{
    style:f=>{
      const raw=sName(f);
      return rStyle(raw.toLowerCase());
    },
    onEachFeature:(f,l)=>{
      const raw=sName(f); if(!raw) return;
      const canon=canonState(raw);
      const disp=canon?canon.name:raw;
      const abbr=canon?canon.abbr:raw.slice(0,2).toUpperCase();
      const key=raw.toLowerCase();

      l.bindTooltip(`<b style="opacity:.45">${abbr}</b>`,
        {permanent:true,direction:'center',className:'leaflet-tooltip'});
      l.on('click',()=>openQ(disp,key,'india'));
      l.on('mouseover',()=>{if(!RS[key]) l.setStyle({fillColor:'rgba(108,99,255,.28)',color:'#6c63ff',weight:2});});
      l.on('mouseout',()=>lyr.resetStyle(l));
    }
  }).addTo(MAP);

  LYRS.push({lyr,type:'india'});
  MAP.fitBounds(lyr.getBounds(),{padding:[20,20]});
  TOT=STATES.length; updProg();
}

// ── MP DIVS ──────────────────────────────────────
async function drawDivs(){
  clearMap(); closeQ();
  setTitle('Madhya Pradesh — 10 Divisions');
  setBC('MP Divisions');
  showLD(true,'Loading MP GeoJSON…');
  const data=await fetchG('mp');
  showLD(false);
  if(!data){showErr('Could not load MP map. Check connection.');return;}

  DIVS.forEach(div=>{
    const key=div.name.toLowerCase();
    const allowed=new Set(div.dists.map(d=>d.toLowerCase()));
    const feats=data.features.filter(f=>fuzzyMatchDist(dName(f),allowed));
    if(!feats.length) return;

    const s=RS[key];
    let fc=div.color+'4a',sc=div.color,wt=2;
    if(s==='ok'){fc='rgba(34,197,94,.32)';sc='#22c55e';}
    if(s==='bad'){fc='rgba(239,68,68,.28)';sc='#ef4444';}
    if(s==='rv'){fc='rgba(245,158,11,.28)';sc='#f59e0b';}

    const lyr=L.geoJSON({type:'FeatureCollection',features:feats},{
      style:{fillColor:fc,color:sc,weight:wt,fillOpacity:1,opacity:1}
    }).addTo(MAP);

    try{
      const c=lyr.getBounds().getCenter();
      L.tooltip({permanent:true,direction:'center',className:'leaflet-tooltip'})
       .setContent(`<b style="opacity:.5">${div.abbr}</b>`)
       .setLatLng(c).addTo(MAP);
    }catch(e){}

    lyr.on('click',()=>openQ(div.name,key,'divs'));
    lyr.on('mouseover',()=>{
      if(!RS[key]) lyr.setStyle({fillColor:div.color+'80',color:div.color,weight:2.5});
    });
    lyr.on('mouseout',()=>{
      const s2=RS[key];
      lyr.setStyle({
        fillColor:s2==='ok'?'rgba(34,197,94,.32)':s2==='bad'?'rgba(239,68,68,.28)':s2==='rv'?'rgba(245,158,11,.28)':div.color+'4a',
        color:s2==='ok'?'#22c55e':s2==='bad'?'#ef4444':s2==='rv'?'#f59e0b':div.color,
        weight:2,fillOpacity:1,opacity:1
      });
    });

    LYRS.push({lyr,type:'div',div,key});
  });

  try{MAP.fitBounds(L.geoJSON(data).getBounds(),{padding:[30,30]});}
  catch(e){MAP.setView([23.5,78],7);}
  TOT=DIVS.length; updProg();
}

// ── MP DISTRICTS ─────────────────────────────────
async function drawDists(divF){
  clearMap(); closeQ();
  CURDIV=divF||null;
  const title=divF?`${divF} Division — Districts`:'MP — All Districts';
  setTitle(title);
  setBC('MP Districts',divF);
  showLD(true,'Loading MP Districts…');
  const data=await fetchG('mp');
  showLD(false);
  if(!data){showErr('Could not load MP districts.');return;}

  let feats=data.features;
  if(divF){
    const divObj=DIVS.find(d=>d.name===divF);
    if(divObj){
      const allowed=new Set(divObj.dists.map(d=>d.toLowerCase()));
      feats=feats.filter(f=>fuzzyMatchDist(dName(f),allowed));
    }
  }

  const lyr=L.geoJSON({type:'FeatureCollection',features:feats},{
    style:f=>{
      const d=dName(f).toLowerCase();
      return rStyle(d,'rgba(26,45,74,.7)','#4fc3f7');
    },
    onEachFeature:(f,l)=>{
      const raw=dName(f); if(!raw) return;
      const key=raw.toLowerCase();
      const canon=canonDist(raw);

      l.bindTooltip(`<b style="opacity:.45">${raw.slice(0,4).toUpperCase()}</b>`,
        {permanent:true,direction:'center',className:'leaflet-tooltip'});
      l.on('click',()=>openQ(canon,key,'dists'));
      l.on('mouseover',()=>{if(!RS[key]) l.setStyle({fillColor:'rgba(79,195,247,.22)',color:'#4fc3f7',weight:2});});
      l.on('mouseout',()=>lyr.resetStyle(l));
    }
  }).addTo(MAP);

  LYRS.push({lyr,type:'dists'});
  try{MAP.fitBounds(lyr.getBounds(),{padding:[20,20]});}
  catch(e){MAP.setView([23.5,78],7);}
  TOT=feats.length; updProg();
}

// ── QUIZ ─────────────────────────────────────────
function openQ(name,key,v){
  CUR={name,key,v};
  if(M==='learn'){openLearn(name,key,v);return;}

  const qp=document.getElementById('qp');
  qp.classList.add('vis');
  document.getElementById('qreg').textContent=
    v==='india'?'INDIA STATE / UT':v==='divs'?'MP DIVISION':'MP DISTRICT';
  document.getElementById('qlbl').textContent='What is this region?';
  clrFb(); rmDrill();

  if(M==='mcq') showMCQ(name,key,v);
  else showType();
}

function openLearn(name,key,v){
  const qp=document.getElementById('qp');
  qp.classList.add('vis');
  document.getElementById('qreg').textContent='👁️ LEARN';
  document.getElementById('qlbl').textContent=name;
  document.getElementById('opts').innerHTML='';
  document.getElementById('opts').style.display='none';
  document.getElementById('tw').style.display='none';
  clrFb();

  if(!RS[key]){
    RS[key]='rv'; SC.rv++;
    updSC(); updProg(); refreshSty(key);
  }

  const nx=document.getElementById('qnx');
  nx.className='vis'; nx.textContent='Got it ✓';

  if(v==='divs'){
    const btn=document.createElement('button');
    btn.className='drbtn';
    btn.textContent=`▶ Drill ${name} Districts`;
    btn.onclick=()=>{closeQ();drillDiv(name);};
    qp.appendChild(btn);
  }
}

function showMCQ(correct,key,v){
  document.getElementById('opts').style.display='flex';
  document.getElementById('tw').style.display='none';
  const pool=v==='india'?STATES.map(s=>s.name):v==='divs'?DIVS.map(d=>d.name):ALLD;
  const wrongs=shuf(pool.filter(n=>n.toLowerCase()!==correct.toLowerCase()));
  const opts=shuf([correct,...wrongs.slice(0,3)]);

  const c=document.getElementById('opts');
  c.innerHTML='';
  opts.forEach(o=>{
    const b=document.createElement('button');
    b.className='opt'; b.textContent=o;
    b.onclick=()=>ansMCQ(o,correct,key);
    c.appendChild(b);
  });
}

function ansMCQ(chosen,correct,key){
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct) b.classList.add('ok');
    else if(b.textContent===chosen&&chosen!==correct) b.classList.add('bad');
  });
  const right=chosen.toLowerCase()===correct.toLowerCase();
  setFb(right,correct,key);
}

function showType(){
  document.getElementById('opts').style.display='none';
  document.getElementById('opts').innerHTML='';
  document.getElementById('tw').style.display='flex';
  const inp=document.getElementById('ti');
  inp.value=''; inp.className=''; inp.disabled=false;
  document.getElementById('tsb').disabled=false;
  setTimeout(()=>inp.focus(),50);
}

function chkType(){
  const inp=document.getElementById('ti');
  const ans=inp.value.trim();
  if(!ans||!CUR) return;
  const right=ans.toLowerCase()===CUR.name.toLowerCase();
  inp.disabled=true; inp.className=right?'ok':'bad';
  document.getElementById('tsb').disabled=true;
  setFb(right,CUR.name,CUR.key);
}

function setFb(right,correct,key){
  const fb=document.getElementById('qfb');
  fb.className=right?'ok':'bad';
  fb.textContent=right?'✓ Correct! — '+correct:'✗ Wrong! Answer: '+correct;
  const nx=document.getElementById('qnx');
  nx.className='vis'; nx.textContent='Next →';

  if(!RS[key]){
    RS[key]=right?'ok':'bad';
    if(right) SC.ok++; else SC.bad++;
    updSC(); updProg(); refreshSty(key);
    chkDone();
  }
}

function closeQ(){
  document.getElementById('qp').classList.remove('vis');
  rmDrill();
  const inp=document.getElementById('ti');
  inp.disabled=false; inp.className='';
  document.getElementById('tsb').disabled=false;
}
function clrFb(){
  const fb=document.getElementById('qfb'); fb.className=''; fb.textContent='';
  const nx=document.getElementById('qnx'); nx.className=''; nx.textContent='';
}
function rmDrill(){document.querySelectorAll('.drbtn').forEach(b=>b.remove());}
function drillDiv(n){
  V='dists';
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v==='dists'));
  drawDists(n);
}

// ── STYLE REFRESH ────────────────────────────────
function refreshSty(key){
  LYRS.forEach(({lyr,type,div,key:dk})=>{
    if(type==='div'){
      if(dk===key){
        const s=RS[key];
        lyr.setStyle({
          fillColor:s==='ok'?'rgba(34,197,94,.32)':s==='bad'?'rgba(239,68,68,.28)':s==='rv'?'rgba(245,158,11,.28)':div.color+'4a',
          color:s==='ok'?'#22c55e':s==='bad'?'#ef4444':s==='rv'?'#f59e0b':div.color,
          weight:2,fillOpacity:1,opacity:1
        });
      }
      return;
    }
    if(!lyr.eachLayer) return;
    lyr.eachLayer(l=>{
      const f=l.feature; if(!f) return;
      const n=type==='india'?sName(f).toLowerCase():dName(f).toLowerCase();
      if(n===key){
        const st=rStyle(key,type==='india'?'rgba(30,58,95,.65)':'rgba(26,45,74,.7)',
                             type==='india'?'#4a90d9':'#4fc3f7');
        l.setStyle(st);
      }
    });
  });
}

// ── SCORE / PROGRESS ─────────────────────────────
function updSC(){
  document.getElementById('s1').textContent=SC.ok;
  document.getElementById('s2').textContent=SC.bad;
  document.getElementById('s3').textContent=SC.rv;
}
function updProg(){
  const done=Object.keys(RS).length;
  document.getElementById('pb').style.width=TOT?(done/TOT*100)+'%':'0%';
}
function chkDone(){
  if(Object.keys(RS).length>=TOT&&TOT>0) setTimeout(showDone,700);
}
function showDone(){
  const t=SC.ok+SC.bad+SC.rv;
  const pct=t?Math.round(SC.ok/t*100):0;
  document.getElementById('dpct').textContent=pct+'%';
  document.getElementById('dok').textContent=SC.ok;
  document.getElementById('dbd').textContent=SC.bad;
  document.getElementById('drv').textContent=SC.rv;
  document.getElementById('done').classList.add('vis');
}
function closeDone(){document.getElementById('done').classList.remove('vis');}

// ── CONTROLS ─────────────────────────────────────
function switchV(v){
  V=v;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',t.dataset.v===v));
  if(v==='india') drawIndia();
  else if(v==='divs') drawDivs();
  else drawDists(null);
}
function setM(m){
  M=m;
  document.querySelectorAll('.mode').forEach(b=>b.classList.toggle('on',b.dataset.m===m));
  closeQ();
}
function resetAll(){
  SC={ok:0,bad:0,rv:0}; RS={};
  updSC(); updProg(); closeDone(); closeQ();
  if(V==='india') drawIndia();
  else if(V==='divs') drawDivs();
  else drawDists(CURDIV);
}
function toggleFS(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

// ── UI HELPERS ───────────────────────────────────
function setTitle(t){document.getElementById('mt').textContent=t;}
function setBC(b2,b3){
  document.getElementById('bc2').textContent=b2;
  if(b3){
    document.getElementById('bs3').style.display='';
    document.getElementById('bc3').style.display='';
    document.getElementById('bc3').textContent=b3;
  }else{
    document.getElementById('bs3').style.display='none';
    document.getElementById('bc3').style.display='none';
  }
}
function showLD(show,msg){
  const el=document.getElementById('ld');
  el.style.display=show?'flex':'none';
  if(msg) document.getElementById('lmsg').textContent=msg;
}
function showErr(msg){
  document.getElementById('ld').innerHTML=
    `<p style="color:var(--err);text-align:center;padding:20px">${msg}</p>
     <button onclick="location.reload()" style="margin-top:10px;padding:7px 16px;background:var(--s2);border:1px solid var(--bord);color:var(--txt);border-radius:8px;cursor:pointer;font-size:13px">↺ Retry</button>`;
  document.getElementById('ld').style.display='flex';
}
function shuf(a){
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── BOOT ─────────────────────────────────────────
drawIndia();
</script>
